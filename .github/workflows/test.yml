name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run protocol unit tests
        env:
          PYTHONPATH: src
          # dummy creds so config loader doesn't crash; tests don't hit the API
          DOUBAO_APP_KEY: dummy
          DOUBAO_ACCESS_KEY: dummy
        run: pytest tests/test_protocol.py -v

      - name: Smoke import check
        env:
          PYTHONPATH: src
          DOUBAO_APP_KEY: dummy
          DOUBAO_ACCESS_KEY: dummy
        run: |
          python -c "from tongchuan.client.doubao import DoubaoClient; print('client OK')"
          python -c "from tongchuan.pipeline.orchestrator import Orchestrator; print('pipeline OK')"
          python -c "from tongchuan.gui.main_window import MainWindow; print('gui OK')"
